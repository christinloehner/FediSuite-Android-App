RepoType: git
Repo: https://github.com/christinloehner/FediSuite-Android-App.git

Builds:
  - versionName: "0.9.13"
    versionCode: 913
    commit: v0.9.13
    subdir: android/app
    sudo:
      - apt-get update
      - apt-get install -y npm
    gradle:
      - yes
    prebuild:
      - sed -i '/org.gradle.java.home/d' ../gradle.properties
      - cd ../..
      - npm ci
      - sed -i '/jvmToolchain/s/17/21/g' node_modules/@react-native/gradle-plugin/react-native-gradle-plugin/build.gradle.kts
      - sed -i '/jvmToolchain/s/17/21/g' node_modules/@react-native/gradle-plugin/settings-plugin/build.gradle.kts
      - sed -i '/jvmToolchain/s/17/21/g' node_modules/@react-native/gradle-plugin/shared/build.gradle.kts
      - sed -i '/jvmToolchain/s/17/21/g' node_modules/@react-native/gradle-plugin/shared-testutil/build.gradle.kts
      - sed -i '/jvmToolchain/s/17/21/g' node_modules/@react-native/gradle-plugin/build.gradle.kts
      - sed -i 
        's/project.kotlinExtension.jvmToolchain(17)/project.kotlinExtension.jvmToolchain(21)/g'
        node_modules/@react-native/gradle-plugin/react-native-gradle-plugin/src/main/kotlin/com/facebook/react/utils/JdkConfiguratorUtils.kt
    scandelete:
      - node_modules

UpdateCheckMode: Static
CurrentVersion: "0.9.13"
CurrentVersionCode: 913
